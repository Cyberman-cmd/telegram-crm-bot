services:
  
  bot:
      build: .
      env_file:
       - .env
      depends_on:
       - db
  db:
    image: postgres
    environment:
      POSTGRES_DB: telegram_crm
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: "1234"
    volumes:
    - db_data:/var/lib/postgresql
volumes:
  db_data:
  
  

    